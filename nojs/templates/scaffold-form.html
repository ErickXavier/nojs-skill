<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoJS Form</title>
    <script src="https://cdn.no-js.dev/"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
        input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        input:invalid, textarea:invalid { border-color: #e74c3c; }
        .error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.25rem; }
        button[type="submit"] { padding: 0.6rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Contact Form</h1>

    <form state="{ name: '', email: '', subject: '', message: '', submitted: false }"
          validate
          on:submit.prevent="submitted = true">

        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" model="name"
                   validate="required|minLength:2"
                   placeholder="Your name">
            <div class="error" bind="$errors.name"></div>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" model="email"
                   validate="required|email"
                   placeholder="you@example.com">
            <div class="error" bind="$errors.email"></div>
        </div>

        <div class="field">
            <label for="subject">Subject</label>
            <select id="subject" model="subject" validate="required">
                <option value="">Select a subject...</option>
                <option value="general">General Inquiry</option>
                <option value="support">Support</option>
                <option value="feedback">Feedback</option>
            </select>
            <div class="error" bind="$errors.subject"></div>
        </div>

        <div class="field">
            <label for="message">Message</label>
            <textarea id="message" model="message" rows="5"
                      validate="required|minLength:10|maxLength:500"
                      placeholder="Your message..."></textarea>
            <div class="error" bind="$errors.message"></div>
            <small><span bind="message.length"></span>/500</small>
        </div>

        <button type="submit" bind-disabled="!$valid">Send Message</button>

        <div show="submitted" style="margin-top: 1rem; padding: 1rem; background: #d4edda; border-radius: 4px;">
            Thank you, <strong bind="name"></strong>! Your message has been sent.
        </div>

    </form>

</body>
</html>
